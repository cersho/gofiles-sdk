name: Validate

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/files-sdk/go.mod
          cache: true
          cache-dependency-path: packages/files-sdk/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download modules
        run: bun run go:download

      - name: Check formatting
        run: bun run go:fmt:check

      - name: Build
        run: bun run go:build

      - name: Vet
        run: bun run go:vet

      - name: Test
        run: bun run go:test

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck docs
        run: bun run docs:types

      - name: Build docs
        run: bun run docs:build
